<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>蛋云AI - Claude Code 监控面板</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050812;
      --panel: #0a101c;
      --panel-2: #101827;
      --line: rgba(119, 141, 169, 0.13);
      --line-strong: rgba(119, 141, 169, 0.22);
      --text: #dce7f3;
      --muted: #8291a7;
      --cyan: #1686a8;
      --cyan-2: #2aa6c8;
      --green: #2fca75;
      --yellow: #d5b438;
      --orange: #f59b3d;
      --red: #ee5259;
      --font-ui: "MiSans", "HarmonyOS Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      --font-metric: "DIN Alternate", "Bahnschrift", "SFMono-Regular", "Consolas", monospace;
      --shadow: 0 20px 55px rgba(0, 0, 0, 0.38);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        linear-gradient(rgba(79, 98, 127, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79, 98, 127, 0.026) 1px, transparent 1px),
        linear-gradient(180deg, #060a14 0%, #050812 42%, #060a15 100%);
      background-size: 44px 44px, 44px 44px, auto;
      color: var(--text);
      font-family: var(--font-ui);
    }
    body { padding: 14px 16px 28px; }
    button, input { font: inherit; }
    button {
      border: 0;
      background: none;
      color: inherit;
      cursor: pointer;
    }

    .page { max-width: 1120px; margin: 0 auto; }

    .toolbar {
      position: relative;
      z-index: 30;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      margin-bottom: 14px;
      padding: 9px 10px;
      border: 1px solid var(--line-strong);
      border-radius: 12px;
      background:
        linear-gradient(180deg, rgba(17, 26, 43, 0.86), rgba(8, 13, 24, 0.9));
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      flex-wrap: wrap;
      overflow: visible;
    }

    .toolbar-left, .toolbar-right, .filter-group, .window-group, .view-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1 1 auto;
      flex-wrap: wrap;
    }
    .toolbar-left { min-width: min(100%, 480px); }
    .toolbar-right {
      flex: 1 1 360px;
      justify-content: flex-end;
      margin-left: auto;
    }
    .filter-group { min-width: 0; }
    .window-group { flex: 1 1 320px; justify-content: flex-end; }
    .view-group { flex: 0 0 auto; }

    .window-btn, .view-btn, .refresh-btn, .select-trigger {
      border-radius: 9px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.018);
      color: #cad5e6;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: border-color 0.16s ease, background-color 0.16s ease, color 0.16s ease, transform 0.16s ease;
    }

    .window-btn, .view-btn, .refresh-btn {
      height: 32px;
      padding: 0 10px;
    }

    .window-btn:hover,
    .view-btn:hover,
    .refresh-btn:hover,
    .select-trigger:hover {
      border-color: rgba(42, 166, 200, 0.42);
      background-color: rgba(42, 166, 200, 0.045);
      color: #ecf8ff;
      transform: translateY(-1px);
    }
    .window-btn, .view-btn, .refresh-btn { padding: 0 10px; }
    .window-btn.active, .view-btn.active, .refresh-btn.active {
      border-color: rgba(42, 166, 200, 0.36);
      background: rgba(22, 134, 168, 0.08);
      color: #ccecf6;
      box-shadow: 0 0 0 1px rgba(22, 134, 168, 0.08) inset;
    }
    .window-btn.active {
      color: #d7f4fb;
      background: linear-gradient(180deg, rgba(28, 132, 164, 0.34), rgba(16, 91, 125, 0.42));
      border-color: rgba(42, 166, 200, 0.38);
      box-shadow: 0 6px 14px rgba(22, 134, 168, 0.08);
    }
    .window-btn {
      min-width: 58px;
      padding-inline: 8px;
      font-size: 12px;
    }
    .view-btn { width: 34px; padding: 0; }

    .toolbar .search {
      flex: 1 1 220px;
      min-width: 180px;
      max-width: 340px;
      height: 32px;
      padding: 0 12px;
      border-radius: 10px;
      border: 1px solid var(--line-strong);
      background: rgba(5, 8, 18, 0.5);
      color: var(--text);
      outline: none;
      transition: border-color 0.16s ease, background-color 0.16s ease, box-shadow 0.16s ease;
    }
    .search::placeholder { color: #64748b; }
    .search:focus {
      border-color: rgba(42, 166, 200, 0.68);
      background: rgba(6, 14, 28, 0.78);
      box-shadow: 0 0 0 3px rgba(22, 134, 168, 0.08);
    }

    .custom-select {
      position: relative;
      flex: 0 1 152px;
      min-width: 122px;
    }
    .custom-select.provider-select { flex-basis: 170px; min-width: 140px; }
    .select-trigger {
      width: 100%;
      height: 32px;
      padding: 0 10px 0 12px;
      justify-content: space-between;
      background: #152033;
      color: #aebbd0;
    }
    .custom-select.active .select-trigger,
    .custom-select.open .select-trigger {
      border-color: rgba(22, 134, 168, 0.68);
      color: #e7f8ff;
      box-shadow: 0 0 0 1px rgba(22, 134, 168, 0.16) inset, 0 10px 24px rgba(0, 0, 0, 0.2);
    }
    .custom-select.open .select-trigger {
      background: #19263a;
      border-color: rgba(42, 166, 200, 0.82);
    }
    .select-label {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    .select-caret {
      width: 7px;
      height: 7px;
      border-right: 1.8px solid #74849b;
      border-bottom: 1.8px solid #74849b;
      transform: translateY(-2px) rotate(45deg);
      transition: transform 0.16s ease;
      flex: 0 0 auto;
    }
    .custom-select.open .select-caret { transform: translateY(2px) rotate(225deg); }
    .select-menu {
      position: absolute;
      z-index: 100;
      top: calc(100% + 7px);
      left: 0;
      width: min(680px, calc(100vw - 32px));
      min-width: max(100%, 228px);
      padding: 6px 0;
      border: 1px solid rgba(46, 64, 92, 0.95);
      border-radius: 8px;
      background: #1b2638;
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(16px);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 0.14s ease, transform 0.14s ease;
      overflow: visible;
    }
    .custom-select.open .select-menu {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
    .select-search-wrap {
      padding: 0 8px 6px;
      border-bottom: 1px solid rgba(119, 141, 169, 0.1);
      margin-bottom: 2px;
    }
    .select-search {
      width: 100%;
      height: 36px;
      padding: 0 10px 0 32px;
      border-radius: 7px;
      border: 1px solid rgba(42, 166, 200, 0.82);
      background:
        linear-gradient(90deg, transparent 0, transparent 30px, transparent 30px),
        #101a2a;
      color: #dce7f3;
      outline: none;
      box-shadow: 0 0 0 2px rgba(22, 134, 168, 0.08);
    }
    .select-search::placeholder { color: #8d9bb0; }
    .select-search-icon {
      position: absolute;
      width: 14px;
      height: 14px;
      margin: 11px 0 0 18px;
      color: #8d9bb0;
      pointer-events: none;
    }
    .select-options {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(158px, 1fr));
      max-height: none;
      overflow: visible;
    }
    .select-option {
      width: 100%;
      min-height: 37px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      padding: 0 13px;
      border-radius: 0;
      color: #aebbd0;
      text-align: left;
      white-space: nowrap;
    }
    .select-option::before {
      content: "";
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid #3b4a61;
      background: #202c3e;
      flex: 0 0 auto;
    }
    .select-option:hover {
      background: #243247;
      color: #eff8ff;
    }
    .select-option.selected {
      background: #26364d;
      color: #d9e8fb;
    }
    .select-option.selected::after {
      content: "";
      display: none;
    }
    .select-option.selected::before {
      border-color: rgba(42, 166, 200, 0.82);
      background:
        linear-gradient(135deg, transparent 35%, #2aa6c8 36%, #2aa6c8 50%, transparent 51%),
        #152d40;
    }

    .panel {
      position: relative;
      z-index: 1;
      border: 1px solid var(--line-strong);
      border-radius: 14px;
      background:
        linear-gradient(180deg, rgba(10, 16, 28, 0.96), rgba(6, 11, 21, 0.98));
      box-shadow: var(--shadow);
      overflow: hidden;
      animation: panel-in 360ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    }
    body.grid-view .panel {
      border: 0;
      background: transparent;
      box-shadow: none;
      overflow: visible;
    }

    @keyframes panel-in {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .table-shell { overflow-x: auto; }
    body.grid-view .table-shell { display: none; }
    table {
      width: 100%;
      min-width: 1040px;
      border-collapse: collapse;
      table-layout: fixed;
    }
    thead th {
      height: 46px;
      padding: 0 12px;
      font-size: 12px;
      font-weight: 600;
      color: #8fa0b7;
      text-align: left;
      border-bottom: 1px solid var(--line-strong);
      background: rgba(8, 13, 24, 0.96);
      position: sticky;
      top: 0;
      z-index: 2;
      white-space: nowrap;
    }
    thead th.sortable { cursor: pointer; user-select: none; }
    thead th.sortable:hover { color: #b9cae0; background: rgba(12, 18, 32, 0.96); }
    .sort-icon { margin-left: 4px; color: #546178; font-size: 11px; }
    .sort-icon.active { color: var(--cyan); }
    tbody tr {
      position: relative;
      border-bottom: 1px solid rgba(119, 141, 169, 0.1);
      transition: background-color 0.16s ease, box-shadow 0.16s ease;
    }
    tbody tr:hover {
      z-index: 40;
      background: rgba(22, 134, 168, 0.035);
      box-shadow: inset 2px 0 0 rgba(22, 134, 168, 0.42);
    }
    td {
      padding: 8px 12px;
      vertical-align: middle;
      font-size: 13px;
      color: #d7e1ee;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .col-mark { width: 86px; }
    .col-provider { width: 204px; }
    .col-service { width: 88px; }
    .col-model { width: 112px; }
    .col-rate { width: 86px; }
    .col-availability { width: 98px; }
    .col-latency { width: 100px; }
    .col-trend {
      overflow: visible;
      position: relative;
    }

    .marks { display: inline-flex; align-items: center; gap: 6px; color: #5a92ff; }
    .mark-triangle { color: #2bc27a; font-size: 12px; }
    .mark-shield { color: #3f8cff; font-size: 12px; }
    .mark-clock { color: #4f5f82; font-size: 12px; }
    .mark-star { color: #7d8aa1; font-size: 12px; }

    .provider-cell { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .provider-name {
      display: flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
      font-weight: 600;
      color: #edf3fa;
    }
    .provider-name > a {
      display: block;
    }
    .provider-name span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .provider-link,
    .card-title-link {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: inherit;
      text-decoration: none;
      transition: color 0.15s ease;
    }
    .provider-link:hover,
    .card-title-link:hover {
      color: #53d7f5;
    }
    .provider-meta { color: #74849b; font-size: 11px; }
    .ext, .fav { width: 12px; height: 12px; color: #7a89a4; flex: 0 0 auto; }

    .service-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 8px;
      border-radius: 7px;
      font-size: 12px;
      line-height: 1;
    }
    .service-badge svg { width: 12px; height: 12px; }
    .service-badge.cx {
      border: 1px solid rgba(49, 216, 169, 0.3);
      background: linear-gradient(180deg, rgba(49, 216, 169, 0.12), rgba(49, 216, 169, 0.055));
      color: #68f0c4;
    }
    .service-badge.cc {
      border: 1px solid rgba(245, 140, 78, 0.34);
      background: linear-gradient(180deg, rgba(245, 140, 78, 0.13), rgba(245, 101, 54, 0.06));
      color: #ff9867;
    }
    .service-badge.gm {
      border: 1px solid rgba(111, 162, 255, 0.34);
      background: linear-gradient(180deg, rgba(111, 162, 255, 0.13), rgba(116, 96, 255, 0.06));
      color: #9fc0ff;
    }
    .service-badge.other {
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: rgba(148, 163, 184, 0.08);
      color: #c3d0df;
    }
    .model { color: #c0ccdb; }
    .rate {
      color: #dbe7f5;
      font-family: var(--font-metric);
      font-weight: 700;
    }
    .availability {
      font-family: var(--font-metric);
      font-weight: 700;
      letter-spacing: 0;
    }
    .availability.high { color: var(--green); }
    .availability.mid { color: var(--orange); }
    .availability.low { color: var(--red); }

    .latency-cell { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .latency-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      flex: 0 0 auto;
      background: var(--green);
      box-shadow: 0 0 0 4px rgba(37, 192, 109, 0.08);
    }
    .latency-dot.warn {
      background: var(--orange);
      box-shadow: 0 0 0 4px rgba(245, 163, 64, 0.08);
    }
    .latency-dot.low {
      background: #ff4f88;
      box-shadow: 0 0 0 4px rgba(255, 79, 136, 0.08);
    }
    .latency-text { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
    .latency-ms {
      color: #f2f6fb;
      font-family: var(--font-metric);
      font-size: 12px;
      line-height: 1.1;
    }
    .latency-time {
      color: #7e8da3;
      font-family: var(--font-metric);
      font-size: 11px;
      line-height: 1.1;
    }

    .trend-head { color: #9aabc2; }
    .trend-row { display: flex; align-items: center; gap: 3px; min-height: 18px; overflow: visible; }
    .trend-item {
      position: relative;
      display: inline-flex;
      flex: 0 0 auto;
    }
    .trend-bar {
      width: 10px;
      height: 18px;
      border-radius: 4px;
      flex: 0 0 auto;
      background: #3a465b;
      box-shadow: inset 0 -1px 0 rgba(0, 0, 0, 0.25);
    }
    .trend-bar.red { background: #de4b52; }
    .trend-bar.yellow { background: #caa51d; }
    .trend-bar.green { background: #2fa84f; }
    .trend-tooltip {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 10px);
      z-index: 400;
      width: 198px;
      padding: 11px 13px 12px;
      border: 1px solid rgba(69, 86, 112, 0.9);
      border-radius: 7px;
      background: #111925;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.45);
      color: #dce7f3;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 4px);
      transition: opacity 0.12s ease, transform 0.12s ease;
    }
    .trend-tooltip::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -6px;
      width: 10px;
      height: 10px;
      border-right: 1px solid rgba(69, 86, 112, 0.9);
      border-bottom: 1px solid rgba(69, 86, 112, 0.9);
      background: #111925;
      transform: translateX(-50%) rotate(45deg);
    }
    .trend-item:hover .trend-tooltip {
      opacity: 1;
      transform: translate(-50%, 0);
    }
    tbody tr:first-child .trend-tooltip {
      top: calc(100% + 10px);
      bottom: auto;
      transform: translate(-50%, -4px);
    }
    tbody tr:first-child .trend-tooltip::after {
      top: -6px;
      bottom: auto;
      transform: translateX(-50%) rotate(225deg);
    }
    tbody tr:first-child .trend-item:hover .trend-tooltip {
      transform: translate(-50%, 0);
    }
    .trend-tooltip-title {
      display: flex;
      align-items: center;
      gap: 7px;
      padding-bottom: 9px;
      margin-bottom: 9px;
      border-bottom: 1px solid rgba(119, 141, 169, 0.16);
      color: #36d8ff;
      font-size: 12px;
    }
    .trend-tooltip-title svg { width: 13px; height: 13px; flex: 0 0 auto; }
    .trend-tooltip-title strong {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
    }
    .trend-tooltip-line {
      display: block;
      color: #8fa0b7;
      font-size: 12px;
      line-height: 1.9;
      text-align: center;
    }
    .trend-tooltip-line strong {
      color: #28d96f;
      font-weight: 700;
    }
    .trend-tooltip-status {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      color: #9caac0;
      font-size: 12px;
      line-height: 2;
    }
    .trend-tooltip-status span {
      width: 11px;
      height: 11px;
      border-radius: 999px;
      background: #6b7688;
    }
    .trend-tooltip-status.green span { background: #2fca75; box-shadow: 0 0 12px rgba(47, 202, 117, 0.45); }
    .trend-tooltip-status.yellow span { background: #d5b438; box-shadow: 0 0 12px rgba(213, 180, 56, 0.35); }
    .trend-tooltip-status.red span { background: #ee5259; box-shadow: 0 0 12px rgba(238, 82, 89, 0.35); }

    .card-grid {
      display: none;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 24px;
    }
    body.grid-view .card-grid { display: grid; }
    .monitor-card {
      min-height: 254px;
      padding: 26px 25px 24px;
      border: 1px solid rgba(34, 201, 135, 0.28);
      border-radius: 8px;
      background:
        radial-gradient(circle at 74% 28%, rgba(42, 205, 126, 0.09), transparent 22%),
        linear-gradient(180deg, rgba(8, 19, 25, 0.96), rgba(5, 13, 19, 0.98));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.025);
    }
    .monitor-card.unstable {
      border-color: rgba(42, 166, 200, 0.22);
      background:
        radial-gradient(circle at 74% 28%, rgba(42, 205, 126, 0.075), transparent 22%),
        linear-gradient(180deg, rgba(11, 16, 27, 0.97), rgba(8, 13, 24, 0.98));
    }
    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 7px;
    }
    .card-marks {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 16px;
    }
    .card-latency {
      text-align: right;
      color: var(--green);
      font-family: var(--font-metric);
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
    }
    .card-latency span {
      display: block;
      margin-top: 3px;
      color: #667792;
      font-weight: 500;
    }
    .card-main {
      display: grid;
      grid-template-columns: 48px minmax(0, 1fr) auto;
      align-items: center;
      gap: 16px;
      min-height: 72px;
    }
    .provider-avatar {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(129, 147, 174, 0.16);
      background: #172132;
      color: #fb8555;
      font-size: 27px;
      line-height: 1;
    }
    .provider-avatar.openai {
      color: #d9e3ef;
      font-size: 24px;
    }
    .card-title-row {
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 0;
    }
    .card-title {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 20px;
      font-weight: 750;
      color: #e0e9f4;
      letter-spacing: 0;
    }
    .card-icons {
      display: inline-flex;
      gap: 5px;
      flex: 0 0 auto;
    }
    .card-icons svg {
      width: 13px;
      height: 13px;
      color: #8391aa;
    }
    .card-status-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--green);
      box-shadow: 0 0 16px rgba(47, 202, 117, 0.62);
    }
    .card-meta {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
      color: #9caac0;
      font-family: var(--font-metric);
      font-size: 13px;
    }
    .card-service {
      display: inline-flex;
      align-items: center;
      height: 22px;
      padding: 0 8px;
      border-radius: 5px;
    }
    .card-availability {
      color: #22f18b;
      font-weight: 800;
    }
    .card-rate {
      color: #dbe7f5;
      font-weight: 800;
    }
    .card-trend-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 27px 0 8px;
      color: #728198;
      font-size: 12px;
    }
    .card-trend {
      display: grid;
      grid-template-columns: repeat(18, minmax(0, 1fr));
      gap: 3px;
    }
    .card-trend .trend-item {
      min-width: 0;
    }
    .card-trend .trend-bar {
      width: 100%;
      height: 40px;
      border-radius: 4px;
    }
    .empty-card {
      grid-column: 1 / -1;
      padding: 30px 12px;
      color: #7f8da6;
      text-align: center;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 4px 0;
      color: #708096;
      font-size: 12px;
      flex-wrap: wrap;

    body.compact-view td { padding-top: 6px; padding-bottom: 6px; }
    body.compact-view .trend-bar { width: 9px; height: 15px; }
    body.compact-view table { min-width: 980px; }

    @media (max-width: 900px) {
      body { padding-inline: 10px; }
      .toolbar {
        align-items: stretch;
        gap: 10px;
      }
      .toolbar-left,
      .toolbar-right,
      .filter-group,
      .window-group {
        flex-basis: 100%;
        justify-content: flex-start;
      }
      .toolbar .search {
        max-width: none;
      }
      .custom-select {
        flex: 1 1 142px;
      }
      .select-menu {
        width: min(520px, calc(100vw - 24px));
      }
      .card-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
      }
    }

    @media (max-width: 640px) {
      body { padding: 0 0 20px; }
      .page { max-width: none; width: 100%; }
      .toolbar {
        margin-bottom: 0;
        border-inline: 0;
        border-top: 0;
        border-radius: 0;
        padding: 10px;
      }
      .toolbar-left,
      .toolbar-right,
      .filter-group,
      .window-group,
      .view-group {
        width: 100%;
        min-width: 0;
      }
      .toolbar .search,
      .custom-select,
      .custom-select.provider-select {
        flex: 1 1 100%;
        min-width: 0;
        max-width: none;
      }
      .window-group {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
      .window-btn {
        min-width: 0;
      }
      .view-group {
        display: none;
      }
      .select-menu {
        left: 0 !important;
        right: auto;
        width: calc(100vw - 20px);
        min-width: 0;
        max-height: min(68vh, 420px);
        overflow: auto;
      }
      .select-options {
        grid-template-columns: 1fr;
      }
      .panel {
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        overflow: visible;
      }
      .table-shell {
        display: none;
      }
      .card-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: 10px;
        padding: 10px;
      }
      .monitor-card {
        width: 100%;
        min-height: auto;
        padding: 15px 14px 14px;
        border-radius: 8px;
      }
      .card-main {
        grid-template-columns: 40px minmax(0, 1fr);
        gap: 12px;
      }
      .provider-avatar {
        width: 40px;
        height: 40px;
        border-radius: 9px;
        font-size: 22px;
      }
      .card-status-dot {
        display: none;
      }
      .card-title-row,
      .model-card-footer,
      .card-meta {
        flex-wrap: wrap;
      }
      .provider-link,
      .card-title-link,
      .provider-name span,
      .provider-meta,
      .model {
        white-space: normal;
        overflow-wrap: anywhere;
      }
      .card-trend {
        grid-template-columns: repeat(9, minmax(0, 1fr));
      }
      .card-trend .trend-bar {
        height: 28px;
      }
      .trend-tooltip {
        display: none;
      }
      table,
      body.compact-view table {
        min-width: 760px;
      }
      thead th,
      td {
        padding-inline: 9px;
      }
    }

    @media (max-width: 380px) {
      .window-group {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .refresh-btn {
        width: 100%;
      }
      .card-meta {
        gap: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="toolbar" aria-label="筛选工具栏">
      <div class="toolbar-left">
        <div class="filter-group">
          <div class="custom-select" data-filter="category" data-value="all">
            <button class="select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span class="select-label">全部分类</span>
              <span class="select-caret" aria-hidden="true"></span>

            <div class="select-menu" role="listbox">
              <div class="select-options">
                <button class="select-option selected" type="button" role="option" data-value="all">全部分类</button>
                <button class="select-option" type="button" role="option" data-value="commercial">商业</button>

            </div>
          </div>
          <div class="custom-select provider-select" data-filter="provider" data-value="all">
            <button class="select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span class="select-label">全部服务商</span>
              <span class="select-caret" aria-hidden="true"></span>
            </button>
            <div class="select-menu" role="listbox">

          <div class="custom-select" data-filter="service" data-value="all">
            <button class="select-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
              <span class="select-label">全部服务</span>
              <span class="select-caret" aria-hidden="true"></span>
            </button>
            <div class="select-menu" role="listbox">
              <div class="select-options">
                <button class="select-option selected" type="button" role="option" data-value="all">全部服务</button>

          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="width:15px;height:15px;">
            <path d="M21 12a9 9 0 1 1-2.6-6.4" />

        <input id="refreshSeconds" class="search" type="number" min="5" value="30" aria-label="自动刷新间隔（秒）" style="width:86px;">

    <section class="panel">
      <div class="table-shell">
        <table>
          <thead>
            <tr>
              <th class="col-mark">标注</th>
              <th class="col-provider sortable" data-sort="provider">服务商 <span class="sort-icon">↕</span></th>
              <th class="col-service sortable" data-sort="service">服务 <span class="sort-icon">↕</span></th>
              <th class="col-model sortable" data-sort="model">模型 <span class="sort-icon">↕</span></th>

              <th class="col-availability sortable" data-sort="availability">可用率 <span class="sort-icon">↕</span></th>
              <th class="col-latency sortable" data-sort="latency">最后监测 <span class="sort-icon">↕</span></th>

      <div id="cardGrid" class="card-grid" aria-label="卡片视图"></div>

    <div class="footer">
      <div>当前筛选：<strong id="filterSummary">全部</strong></div>
      <div>最后刷新：<strong id="lastRefresh">--:--:--</strong></div>
    </div>

  <script nonce="__CSP_NONCE_VALUE__">
    const STATUS_API_URL = '/api/llm-monitor/status';
    const GROUPS_API_URL = '/api/llm-monitor/groups';
    const DEFAULT_PROVIDER_URL = 'https://api.sunshinelink.online/';

    function detectLocale() {
      const saved = localStorage.getItem('sub2api_locale');
      if (saved === 'zh' || saved === 'en') return saved;
      return navigator.language.toLowerCase().startsWith('zh') ? 'zh' : 'en';
    }

    const locale = detectLocale();
    const messages = {
      en: {
        title: 'Danyun AI - Claude Code Monitor',
        toolbar: 'Filter toolbar',
        allCategories: 'All categories',
        commercial: 'Commercial',
        allProviders: 'All providers',
        searchProviders: 'Search providers',
        search: 'Search',
        searchPlaceholder: 'Search provider or model',
        searchSelectPlaceholder: 'Search...',
        allServices: 'All services',
        allChannels: 'All channels',
        selfOperated: 'Self-run',
        windowGroup: 'Time window',
        viewGroup: 'View switcher',
        window90m: 'Last 90 minutes',
        window24h: 'Last 24 hours',
        window7d: 'Last 7 days',
        window30d: 'Last 30 days',
        windowAll: 'All day',

        gridView: 'Card view',

        annotations: 'Marks',
        provider: 'Provider',
        service: 'Service',
        model: 'Model',
        rate: 'Rate',
        availability: 'Availability',
        lastCheck: 'Last check',
        availabilityTrend: 'Availability trend',
        currentFilter: 'Current filter:',
        lastRefresh: 'Last refresh:',
        available: 'Available',
        degraded: 'Degraded',
        unavailable: 'Unavailable',
        unknown: 'Unknown',
        providerFallback: 'Provider {n}',
        noMatchedGroupRecords: 'No monitor records match the API group names',
        groupHttpError: 'Group API HTTP {status}',
        loadFailed: 'Load failed: {message}',
        all: 'All',
        filterSearch: 'Search: {query}',
        noAnnotation: 'No mark',
        latency: 'Latency',
        now: 'Now',
        noMatchingData: 'No matching data',
        loading: 'Loading',
        loadingData: 'Loading data from API...',
        apiError: 'API error',
        multiplier: 'Rate:',
        cardAvailability: 'Availability:'
      },
      zh: {
        title: '蛋云AI - Claude Code 监控面板',
        toolbar: '筛选工具栏',
        allCategories: '全部分类',
        commercial: '商业',
        allProviders: '全部服务商',
        searchProviders: '搜索服务商',
        search: '搜索',
        searchPlaceholder: '搜索服务商或模型',
        searchSelectPlaceholder: '搜索...',
        allServices: '全部服务',
        allChannels: '全部通道',
        selfOperated: '自营',
        windowGroup: '时间窗口',
        viewGroup: '视图切换',
        window90m: '近90分钟',
        window24h: '近24小时',
        window7d: '近7天',
        window30d: '近30天',
        windowAll: '全天',
        listView: '列表视图',
        gridView: '卡片视图',
        manualRefresh: '手动刷新',
        refreshInterval: '自动刷新间隔（秒）',
        annotations: '标注',
        provider: '服务商',
        service: '服务',
        model: '模型',
        rate: '倍率',
        availability: '可用率',
        lastCheck: '最后监测',
        availabilityTrend: '可用率趋势',
        currentFilter: '当前筛选：',
        lastRefresh: '最后刷新：',
        available: '可用',
        degraded: '降级',
        unavailable: '不可用',
        unknown: '未知',
        providerFallback: '服务商 {n}',
        noMatchedGroupRecords: '没有匹配 API 分组名称的监控记录',
        groupHttpError: '分组接口 HTTP {status}',
        loadFailed: '加载失败：{message}',
        all: '全部',
        filterSearch: '搜索: {query}',
        noAnnotation: '无标注',
        latency: '延迟',
        now: '现在',
        noMatchingData: '没有匹配的数据',
        loading: '加载中',
        loadingData: '正在从接口加载数据...',
        apiError: '接口错误',
        multiplier: '倍率：',
        cardAvailability: '可用率：'
      }
    };

    function t(key, params = {}) {
      const template = messages[locale]?.[key] || messages.en[key] || key;
      return template.replace(/\{(\w+)\}/g, (_, name) => params[name] ?? '');
    }

    const DEFAULT_MONITOR_TITLE = t('title');
    const injectedMonitorTitle = window.__APP_CONFIG__?.llm_monitor_title?.trim();
    const injectedProviderUrl = window.__APP_CONFIG__?.llm_monitor_provider_url?.trim();
    document.documentElement.lang = locale === 'zh' ? 'zh-CN' : 'en';
    document.title = injectedMonitorTitle || DEFAULT_MONITOR_TITLE;

    let rows = [];
    let groupIndex = new Map();

    const state = {
      query: '',
      category: 'all',
      provider: 'all',
      service: 'all',
      channel: 'all',
      window: '90m',
      view: 'list',
      sortKey: 'availability',
      sortDir: -1,
      autoRefresh: true,
      refreshHandle: null,
      loading: true,
      error: ''
    };

    const els = {
      tableBody: document.getElementById('tableBody'),
      search: document.getElementById('searchInput'),
      refreshBtn: document.getElementById('refreshBtn'),
      refreshSeconds: document.getElementById('refreshSeconds'),
      cardGrid: document.getElementById('cardGrid'),
      windowLabel: document.getElementById('windowLabel'),
      filterSummary: document.getElementById('filterSummary'),
      lastRefresh: document.getElementById('lastRefresh')
    };

    function setSelectInitial(filter, labelKey, optionValueLabels = {}) {
      const select = document.querySelector(`.custom-select[data-filter="${filter}"]`);
      if (!select) return;
      const label = select.querySelector('.select-label');
      if (label) label.textContent = t(labelKey);
      select.querySelectorAll('.select-option').forEach((option) => {
        const key = optionValueLabels[option.dataset.value];
        if (key) option.textContent = t(key);
      });
    }

    function applyStaticText() {
      document.querySelector('.toolbar')?.setAttribute('aria-label', t('toolbar'));
      setSelectInitial('category', 'allCategories', { all: 'allCategories', commercial: 'commercial' });
      setSelectInitial('provider', 'allProviders', { all: 'allProviders' });
      setSelectInitial('service', 'allServices', { all: 'allServices' });
      setSelectInitial('channel', 'allChannels', { all: 'allChannels', '自营': 'selfOperated' });

      document.querySelector('.provider-select .select-search')?.setAttribute('placeholder', t('searchSelectPlaceholder'));
      document.querySelector('.provider-select .select-search')?.setAttribute('aria-label', t('searchProviders'));
      els.search.placeholder = t('searchPlaceholder');
      els.search.setAttribute('aria-label', t('search'));
      document.querySelector('.window-group')?.setAttribute('aria-label', t('windowGroup'));
      document.querySelector('.view-group')?.setAttribute('aria-label', t('viewGroup'));
      document.querySelector('[data-window="90m"]').textContent = t('window90m');
      document.querySelector('[data-window="24h"]').textContent = t('window24h');
      document.querySelector('[data-window="7d"]').textContent = t('window7d');
      document.querySelector('[data-window="30d"]').textContent = t('window30d');
      document.querySelector('[data-window="all"]').textContent = t('windowAll');
      document.querySelector('[data-view="list"]')?.setAttribute('title', t('listView'));
      document.querySelector('[data-view="grid"]')?.setAttribute('title', t('gridView'));
      els.refreshBtn.setAttribute('title', t('manualRefresh'));
      els.refreshSeconds.setAttribute('aria-label', t('refreshInterval'));
      const sortIcon = '<span class="sort-icon">↕</span>';
      document.querySelector('.col-mark').textContent = t('annotations');
      document.querySelector('.col-provider').innerHTML = `${t('provider')} ${sortIcon}`;
      document.querySelector('.col-service').innerHTML = `${t('service')} ${sortIcon}`;
      document.querySelector('.col-model').innerHTML = `${t('model')} ${sortIcon}`;
      document.querySelector('.col-rate').innerHTML = `${t('rate')} ${sortIcon}`;
      document.querySelector('.col-availability').innerHTML = `${t('availability')} ${sortIcon}`;
      document.querySelector('.col-latency').innerHTML = `${t('lastCheck')} ${sortIcon}`;
      document.querySelector('.trend-head').innerHTML = `${t('availabilityTrend')} <span id="windowLabel">${windowLabel(state.window)}</span>`;
      els.windowLabel = document.getElementById('windowLabel');
      els.cardGrid.setAttribute('aria-label', t('gridView'));
      const footerItems = document.querySelectorAll('.footer > div');
      if (footerItems[0]) footerItems[0].firstChild.textContent = t('currentFilter');
      if (footerItems[1]) footerItems[1].firstChild.textContent = t('lastRefresh');
      els.filterSummary.textContent = t('all');
    }

    const mobileCardsMediaQuery = window.matchMedia('(max-width: 640px)');

    function effectiveViewMode() {
      return mobileCardsMediaQuery.matches ? 'grid' : state.view;
    }

    function syncViewMode() {
      const view = effectiveViewMode();
      document.body.classList.toggle('grid-view', view === 'grid');
      document.querySelectorAll('.view-btn').forEach((btn) => {
        const active = btn.dataset.view === view;
        btn.classList.toggle('active', active);
        btn.setAttribute('aria-pressed', active ? 'true' : 'false');
      });
    }

    function pickValue(source, keys, fallback = undefined) {
      for (const key of keys) {
        if (source && source[key] !== undefined && source[key] !== null) return source[key];
      }
      return fallback;
    }

    function normalizeProviderKey(value) {
      return String(value || '').replace(/\s+/g, '').toLocaleLowerCase();
    }

    function statusApiUrl() {
      const url = new URL(STATUS_API_URL, window.location.origin);
      url.searchParams.set('period', state.window);
      url.searchParams.set('board', 'hot');
      return url.toString();
    }

    function configuredProviderUrl() {
      return injectedProviderUrl || DEFAULT_PROVIDER_URL;
    }

    function asNumber(value, fallback = 0) {
      if (typeof value === 'number' && Number.isFinite(value)) return value;
      if (typeof value === 'string') {
        const parsed = Number(value.replace('%', '').replace('×', '').replace('x', '').trim());
        if (Number.isFinite(parsed)) return parsed;
      }
      return fallback;
    }

    function normalizeApiPayload(payload) {
      if (Array.isArray(payload)) return payload;
      if (!payload || typeof payload !== 'object') return [];

      const candidates = [
        payload.groups,
        payload.data,
        payload.items,
        payload.list,
        payload.status,
        payload.statuses,
        payload.providers,
        payload.services,
        payload.result
      ];

      for (const candidate of candidates) {
        if (Array.isArray(candidate)) return candidate;
        if (candidate && typeof candidate === 'object') {
          const nested = normalizeApiPayload(candidate);
          if (nested.length) return nested;
        }
      }
      return [];
    }

    function normalizeGroupPayload(payload) {
      const list = Array.isArray(payload)
        ? payload
        : (Array.isArray(payload?.data) ? payload.data : []);

      return list.map((group) => ({
        name: String(pickValue(group, ['name', 'group_name', 'groupName'], '')).trim(),
        platform: String(pickValue(group, ['platform'], '')).trim(),
        rateMultiplier: asNumber(pickValue(group, ['rate_multiplier', 'rateMultiplier'], 1), 1)
      })).filter((group) => group.name);
    }

    async function loadMonitorGroups() {
      const response = await fetch(GROUPS_API_URL, {
        cache: 'no-store',
        headers: { 'Accept': 'application/json' }
      });
      if (!response.ok) throw new Error(t('groupHttpError', { status: response.status }));

      const payload = await response.json();
      const groups = normalizeGroupPayload(payload);
      groupIndex = new Map(groups.map((group) => [normalizeProviderKey(group.name), group]));
    }

    function applyGroupFilter(items) {
      if (!groupIndex.size) return [];

      return items.map((item) => ({
        item,
        group: groupIndex.get(normalizeProviderKey(pickValue(item, ['provider', 'provider_name', 'providerName'], '')))
      })).filter((entry) => entry.group);
    }

    function statusAvailability(status) {
      if (Number(status) === 1) return 100;
      if (Number(status) === 2) return 70;
      return 0;
    }

    function pointTone(point) {
      const status = asNumber(pickValue(point, ['status'], undefined), undefined);
      const availability = asNumber(pickValue(point, ['availability'], statusAvailability(status)), 0);
      if (status === 1 || availability >= 75) return 'green';
      if (status === 2 || availability >= 30) return 'yellow';
      return 'red';
    }

    function statusText(status) {
      switch (Number(status)) {
        case 1: return t('available');
        case 2: return t('degraded');
        case 0: return t('unavailable');
        default: return t('unknown');
      }
    }

    function pointTime(point, fallback = '--:--') {
      const displayStart = pickValue(point, ['displayStartTimestamp'], 0);
      const displayEnd = pickValue(point, ['displayEndTimestamp'], 0);
      if (displayStart && displayEnd) {
        return formatTrendRange(displayStart, displayEnd, state.window);
      }
      const value = pickValue(point, ['displayTimestamp', 'time', 'timestamp', 'checked_at', 'checkedAt'], '');
      if (typeof value === 'string' && value.trim() && !/^\d+$/.test(value.trim())) {
        return value.trim();
      }
      return formatCheckedTime(value, fallback);
    }

    function pointTimestamp(point) {
      return asNumber(pickValue(point, ['timestamp', 'checked_at', 'checkedAt'], 0), 0);
    }

    function monitorIntervalMs(item, layer) {
      const interval = asNumber(
        pickValue(item, ['interval_ms', 'intervalMs'], pickValue(layer, ['interval_ms', 'intervalMs'], 300000)),
        300000
      );
      return Math.max(1000, interval);
    }

    function timestampToMs(value) {
      const numeric = asNumber(value, 0);
      if (numeric <= 0) return 0;
      return numeric < 10000000000 ? numeric * 1000 : numeric;
    }

    function trendBucketStepMs(windowKey, monitorStepMs) {
      switch (windowKey) {
        case '24h':
          return 60 * 60 * 1000;
        case '7d':
        case '30d':
        case 'all':
          return 24 * 60 * 60 * 1000;
        default:
          return Math.max(1000, monitorStepMs || 300000);
      }
    }

    function alignTrendRangeEndMs(timestampMs, windowKey) {
      if (windowKey === '24h') {
        const date = new Date(timestampMs);
        date.setMinutes(0, 0, 0);
        const hourStart = date.getTime();
        return hourStart < timestampMs ? hourStart + (60 * 60 * 1000) : hourStart;
      }
      if (windowKey === '7d' || windowKey === '30d' || windowKey === 'all') {
        const date = new Date(timestampMs);
        date.setHours(0, 0, 0, 0);
        const dayStart = date.getTime();
        return dayStart < timestampMs ? dayStart + (24 * 60 * 60 * 1000) : dayStart;
      }
      return timestampMs;
    }

    function formatHour(valueMs) {
      return String(new Date(valueMs).getHours()).padStart(2, '0') + ':00';
    }

    function formatMonthDay(valueMs) {
      const date = new Date(valueMs);
      return `${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }

    function formatTrendRange(startValue, endValue, windowKey) {
      const startMs = timestampToMs(startValue);
      const endMs = timestampToMs(endValue);
      if (!startMs || !endMs) return '--:--';
      if (windowKey === '24h') {
        return `${formatHour(startMs)} - ${formatHour(endMs)}`;
      }
      if (windowKey === '7d' || windowKey === '30d' || windowKey === 'all') {
        return `${formatMonthDay(startMs)} - ${formatMonthDay(endMs)}`;
      }
      return formatCheckedTime(endMs);
    }

    function normalizeTrendPoint(point, row, fallbackIndex) {
      if (point && typeof point === 'object') {
        if ('tone' in point && !('status' in point) && !('availability' in point)) {
          const tone = String(point.tone || 'red');
          const status = tone === 'green' ? 1 : (tone === 'yellow' ? 2 : 0);
          return {
            tone,
            status,
            statusText: statusText(status),
            time: pointTime(point, row?.time || '--:--'),
            latency: row?.latency || 0,
            availability: row?.availability || 0
          };
        }
        const status = asNumber(pickValue(point, ['status'], undefined), undefined);
        const latency = asNumber(pickValue(point, ['latency', 'latency_ms', 'latencyMs'], row?.latency || 0));
        return {
          tone: pointTone(point),
          status,
          statusText: statusText(status),
          time: pointTime(point, row?.time || '--:--'),
          latency,
          availability: asNumber(pickValue(point, ['availability'], statusAvailability(status)), 0)
        };
      }
      const tone = String(point || 'red');
      const status = tone === 'green' ? 1 : (tone === 'yellow' ? 2 : 0);
      return {
        tone,
        status,
        statusText: statusText(status),
        time: row?.time || `#${fallbackIndex + 1}`,
        latency: row?.latency || 0,
        availability: row?.availability || 0
      };
    }

    function serviceCode(value) {
      const raw = String(value || '').trim();
      const code = raw.toUpperCase();
      if (code.includes('CLAUDE CODE')) return 'CC';
      if (code.includes('CODEX')) return 'CX';
      if (code.includes('GEMINI')) return 'GM';
      return code || 'CC';
    }

    function formatServiceOption(code) {
      switch (code) {
        case 'CC': return 'Claude Code (CC)';
        case 'CX': return 'Codex (CX)';
        case 'GM': return 'Gemini (GM)';
        default: return code;
      }
    }

    function serviceTone(code) {
      switch (String(code || '').toUpperCase()) {
        case 'CX': return 'cx';
        case 'CC': return 'cc';
        case 'GM': return 'gm';
        default: return 'other';
      }
    }

    function serviceIcon(code) {
      switch (String(code || '').toUpperCase()) {
        case 'CX':
          return `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 4.4c2.1-2 5.7-.4 5.7 2.6 2.9.2 4.3 3.8 2.1 5.7 2 2.1.4 5.7-2.6 5.7-.2 2.9-3.8 4.3-5.7 2.1-2.1 2-5.7.4-5.7-2.6-2.9-.2-4.3-3.8-2.1-5.7-2-2.1-.4-5.7 2.6-5.7.2-2.9 3.8-4.3 5.7-2.1Z" />
              <path d="M8.3 8.5 15.7 16" />
              <path d="M15.7 8.5 8.3 16" />
            </svg>
          `;
        case 'CC':
          return `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 3.2 13.8 9l5.9-1.8-4.1 4.6 4.1 4.6-5.9-1.8L12 20.8l-1.8-6.2-5.9 1.8 4.1-4.6-4.1-4.6L10.2 9 12 3.2Z" />
            </svg>
          `;
        case 'GM':
          return `
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M12 2.8 14.5 9.5 21.2 12l-6.7 2.5L12 21.2l-2.5-6.7L2.8 12l6.7-2.5L12 2.8Z" />
              <path d="M5.6 3.8 6.5 6l2.2.9-2.2.9-.9 2.2-.9-2.2-2.2-.9 2.2-.9.9-2.2Z" opacity=".7" />
            </svg>
          `;
        default:
          return `
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 2 4 6l8 4 8-4-8-4Z" />
              <path d="M4 10l8 4 8-4" />
              <path d="M4 14l8 4 8-4" />
            </svg>
          `;
      }
    }

    function serviceBadge(code, extraClass = '') {
      const normalized = String(code || '').toUpperCase();
      return `
        <span class="service-badge ${serviceTone(normalized)} ${extraClass}">
          ${serviceIcon(normalized)}
          ${escapeHtml(normalized || 'N/A')}
        </span>
      `;
    }

    function formatCheckedTime(value, fallback = '--:--') {
      const numeric = asNumber(value, 0);
      if (numeric > 0) {
        const milliseconds = numeric < 10000000000 ? numeric * 1000 : numeric;
        return new Date(milliseconds).toLocaleTimeString(locale === 'zh' ? 'zh-CN' : 'en-US', {
          hour: '2-digit',
          minute: '2-digit'
        });
      }
      const text = String(value || '').trim();
      return text ? text.slice(-5) : fallback;
    }

    function normalizeTrend(item, availability, index) {
      const rawTrend = pickValue(item, ['trend', 'history', 'availability_trend', 'availabilityTrend', 'status_history', 'statusHistory'], null);
      if (Array.isArray(rawTrend) && rawTrend.length) {
        return rawTrend.map((entry) => {
          if (entry && typeof entry === 'object' && ('status' in entry || 'availability' in entry)) {
            return pointTone(entry);
          }
          const value = typeof entry === 'object'
            ? pickValue(entry, ['state', 'color', 'rate', 'success_rate'], '')
            : entry;
          if (typeof value === 'number') {
            if (value >= 75) return 'green';
            if (value >= 30) return 'yellow';
            return 'red';
          }
          const text = String(value).toLowerCase();
          if (text.includes('green') || text.includes('ok') || text.includes('success') || text === '1' || text === 'true') return 'green';
          if (text.includes('yellow') || text.includes('warn') || text.includes('partial')) return 'yellow';
          return 'red';
        }).slice(-18);
      }
      return trendBars(availability, index);
    }

    function normalizeStatusItem(item, index, group) {
      const layer = Array.isArray(item.layers) && item.layers.length ? item.layers[0] : {};
      const current = layer.current_status || {};
      const timeline = Array.isArray(layer.timeline) ? layer.timeline : [];
      const latestPoint = timeline.length ? timeline[timeline.length - 1] : {};
      const provider = String(pickValue(item, ['provider', 'provider_name', 'providerName', 'name', 'title', 'service_provider'], t('providerFallback', { n: index + 1 })));
      const service = serviceCode(pickValue(item, ['service', 'service_type', 'serviceType', 'type'], 'CC'));
      const category = String(pickValue(item, ['category'], ''));
      const model = String(pickValue(layer, ['model', 'request_model'], pickValue(item, ['model', 'model_name', 'modelName'], '')));
      const rateMultiplier = asNumber(group?.rateMultiplier, 1);
      const availabilityValues = timeline.map((point) => asNumber(point.availability, statusAvailability(point.status)));
      const availability = availabilityValues.length
        ? Math.round((availabilityValues.reduce((sum, value) => sum + value, 0) / availabilityValues.length) * 100) / 100
        : asNumber(pickValue(item, ['availability', 'available_rate', 'availableRate', 'success_rate', 'successRate', 'rate_percent', 'uptime'], statusAvailability(pickValue(current, ['status'], item.current_status))), 0);
      const latency = asNumber(pickValue(current, ['latency'], pickValue(latestPoint, ['latency'], pickValue(item, ['latency', 'latency_ms', 'latencyMs', 'response_time', 'responseTime', 'last_latency'], 0))));
      const time = formatCheckedTime(pickValue(current, ['timestamp'], pickValue(latestPoint, ['time', 'timestamp'], pickValue(item, ['time', 'checked_at', 'checkedAt', 'last_check', 'lastCheck', 'last_monitor', 'lastMonitor'], ''))));
      const note = String(pickValue(item, ['sponsor', 'channel', 'note', 'tag', 'owner', 'source'], t('selfOperated')));
      let trendSource = timeline.length
        ? [...timeline].sort((a, b) => pointTimestamp(a) - pointTimestamp(b)).slice(-18)
        : normalizeTrend(item, availability, index);
      const currentTimestamp = asNumber(pickValue(current, ['timestamp'], 0), 0);
      const latestTimestamp = asNumber(pickValue(latestPoint, ['timestamp'], 0), 0);
      if (currentTimestamp > 0 && currentTimestamp >= latestTimestamp) {
        const currentPoint = {
          status: pickValue(current, ['status'], pickValue(item, ['current_status'], undefined)),
          latency,
          timestamp: currentTimestamp,
          availability: statusAvailability(pickValue(current, ['status'], undefined))
        };
        if (trendSource.length) {
          trendSource[trendSource.length - 1] = currentPoint;
        } else {
          trendSource.push(currentPoint);
        }
      }
      const intervalMs = monitorIntervalMs(item, layer);
      const anchorTimestamp = currentTimestamp > 0
        ? currentTimestamp
        : asNumber(pickValue(trendSource[trendSource.length - 1], ['timestamp', 'displayTimestamp'], 0), 0);
      const anchorMs = timestampToMs(anchorTimestamp);
      if (anchorMs > 0) {
        const intervalStep = trendBucketStepMs(state.window, intervalMs);
        const showRange = state.window !== '90m';
        const anchorEndMs = showRange ? alignTrendRangeEndMs(anchorMs, state.window) : anchorMs;
        trendSource = trendSource.map((point, pointIndex) => {
          const displayEndTimestamp = anchorEndMs - ((trendSource.length - 1 - pointIndex) * intervalStep);
          const displayStartTimestamp = displayEndTimestamp - intervalStep;
          const displayTimestamp = displayEndTimestamp;
          const displayFields = showRange
            ? { displayTimestamp, displayStartTimestamp, displayEndTimestamp }
            : { displayTimestamp };
          if (point && typeof point === 'object') {
            return { ...point, ...displayFields };
          }
          return { tone: point, ...displayFields };
        });
      }
      const trend = trendSource.map((point, pointIndex) => normalizeTrendPoint(point, { availability, latency, time }, pointIndex));
      return {
        provider,
        service,
        category,
        model,
        rate: rateMultiplier,
        rateMultiplier,
        groupName: group?.name || provider,
        groupPlatform: group?.platform || '',
        availability,
        latency,
        time,
        note,
        channel: String(pickValue(item, ['channel'], '')),
        annotations: Array.isArray(item.annotations) ? item.annotations : [],
        trend
      };
    }

    async function loadStatusData() {
      state.loading = true;
      state.error = '';
      renderTable();

      try {
        const [response] = await Promise.all([
          fetch(statusApiUrl(), {
            cache: 'no-store',
            headers: { 'Accept': 'application/json' }
          }),
          loadMonitorGroups()
        ]);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const payload = await response.json();
        const matched = applyGroupFilter(normalizeApiPayload(payload));
        rows = matched.map(({ item, group }, index) => normalizeStatusItem(item, index, group));
        if (!rows.length) {
          throw new Error(t('noMatchedGroupRecords'));
        }

        state.loading = false;
        state.error = '';
        populateFilterOptions();
        if (state.provider !== 'all' && !rows.some((row) => row.provider === state.provider)) {
          state.provider = 'all';
        }
        if (state.service !== 'all' && !rows.some((row) => row.service === state.service)) {
          state.service = 'all';
        }
        if (state.channel !== 'all' && !rows.some((row) => row.channel === state.channel || row.note === state.channel)) {
          state.channel = 'all';
        }
        if (state.category !== 'all' && !rows.some((row) => row.category === state.category)) {
          state.category = 'all';
        }
        syncAllSelects();
        renderTable();
      } catch (error) {
        rows = [];
        state.loading = false;
        state.error = t('loadFailed', { message: error.message });
        populateFilterOptions();
        syncAllSelects();
        renderTable();
      }
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatRate(value) {
      const numeric = asNumber(value, 1);
      return `${numeric.toFixed(3).replace(/\.?0+$/, '')}x`;
    }

    function availabilityClass(value) {
      if (value >= 75) return 'high';
      if (value >= 30) return 'mid';
      return 'low';
    }

    function latencyClass(latency) {
      if (latency < 500) return '';
      if (latency < 3000) return 'warn';
      return 'low';
    }

    function trendBars(score, seed) {
      const bars = [];
      const len = 18;
      const normalized = Math.max(0, Math.min(score, 100)) / 100;
      for (let i = 0; i < len; i++) {
        if (score <= 0) {
          bars.push('red');
          continue;
        }
        if (score >= 99) {
          bars.push(i === 6 || i === 13 ? 'yellow' : 'green');
          continue;
        }
        if (normalized >= 0.85) {
          bars.push(i % 8 === (seed % 8) ? 'yellow' : 'green');
          continue;
        }
        if (normalized >= 0.6) {
          bars.push(i % 6 === (seed % 6) || (i > 9 && i % 4 === 1) ? 'yellow' : 'green');
          continue;
        }
        if (normalized >= 0.3) {
          bars.push(i < 4 || i > 13 ? 'red' : (i % 5 === (seed % 5) ? 'yellow' : 'green'));
          continue;
        }
        bars.push(i < 10 ? 'red' : (i % 4 === (seed % 4) ? 'yellow' : 'red'));
      }
      return bars;
    }

    function windowLabel(windowKey) {
      switch (windowKey) {
        case '24h': return t('window24h');
        case '7d': return t('window7d');
        case '30d': return t('window30d');
        case 'all': return t('windowAll');
        default: return t('window90m');
      }
    }

    function filterSummaryText() {
      const parts = [];
      if (state.category !== 'all') parts.push(state.category);
      if (state.service !== 'all') parts.push(formatServiceOption(state.service));
      if (state.provider !== 'all') parts.push(state.provider);
      if (state.channel !== 'all') parts.push(state.channel);
      if (state.query) parts.push(t('filterSearch', { query: state.query }));
      return parts.length ? parts.join(' · ') : t('all');
    }

    function searchText(row) {
      return [row.provider, row.groupName, row.service, row.model, row.note, row.channel, row.category, row.rateMultiplier, row.availability, row.latency, row.time]
        .join(' ')
        .toLowerCase();
    }

    function applyFilters(rowsToFilter) {
      const query = state.query.trim().toLowerCase();
      return rowsToFilter.filter((row) => {
        if (state.category !== 'all' && row.category !== state.category) return false;
        if (state.provider !== 'all' && row.provider !== state.provider) return false;
        if (state.service !== 'all' && row.service !== state.service) return false;
        if (state.channel !== 'all' && row.channel !== state.channel && row.note !== state.channel) return false;
        if (query && !searchText(row).includes(query)) return false;
        return true;
      });
    }

    function compareBy(key, dir, a, b) {
      const av = a[key];
      const bv = b[key];
      if (key === 'provider' || key === 'service' || key === 'model') {
        return dir * String(av).localeCompare(String(bv), 'zh-Hans-CN');
      }
      if (key === 'rate' || key === 'availability' || key === 'latency') {
        return dir * ((Number(av) || 0) - (Number(bv) || 0));
      }
      return dir * String(av).localeCompare(String(bv), 'zh-Hans-CN');
    }

    function sortRows(rowsToSort) {
      return [...rowsToSort].sort((a, b) => compareBy(state.sortKey, state.sortDir, a, b));
    }

    function updateSortIndicators() {
      document.querySelectorAll('th.sortable').forEach((th) => {
        const icon = th.querySelector('.sort-icon');
        if (!icon) return;
        const key = th.dataset.sort;
        if (key === state.sortKey) {
          icon.textContent = state.sortDir > 0 ? '↑' : '↓';
          icon.classList.add('active');
        } else {
          icon.textContent = '↕';
          icon.classList.remove('active');
        }
      });
    }

    function annotationGlyph(annotation) {
      const icon = String(annotation.icon || annotation.id || '').toLowerCase();
      if (icon.includes('beacon')) return '▲';
      if (icon.includes('shield')) return '◆';
      if (icon.includes('activity') || icon.includes('clock') || icon.includes('frequency')) return '◎';
      return '☆';
    }

    function annotationClass(annotation) {
      const icon = String(annotation.icon || annotation.id || '').toLowerCase();
      const family = String(annotation.family || '').toLowerCase();
      if (icon.includes('beacon') || family === 'positive') return 'mark-triangle';
      if (icon.includes('shield')) return 'mark-shield';
      if (icon.includes('activity') || family === 'neutral') return 'mark-clock';
      return 'mark-star';
    }

    function renderAnnotations(row) {
      const annotations = row.annotations.length ? row.annotations.slice(0, 4) : [{ label: t('noAnnotation'), icon: 'empty' }];
      return annotations.map((annotation) => (
        `<span class="${annotationClass(annotation)}" title="${escapeHtml(annotation.tooltip || annotation.label || '')}">${escapeHtml(annotationGlyph(annotation))}</span>`
      )).join('');
    }

    function renderTrendBars(row, index) {
      const trend = row.trend?.length ? row.trend.slice(-18) : trendBars(row.availability, index + row.provider.length);
      const points = trend.map((point, pointIndex) => normalizeTrendPoint(point, row, pointIndex));
      return points.map((point) => `
        <span class="trend-item">
          <span class="trend-bar ${escapeHtml(point.tone)}"></span>
          <span class="trend-tooltip" role="tooltip">
            <span class="trend-tooltip-title">
              ${serviceIcon(row.service)}
              <strong>${escapeHtml(row.model || row.service)}</strong>
            </span>
            <span class="trend-tooltip-line">${escapeHtml(point.time)}</span>
            <span class="trend-tooltip-status ${escapeHtml(point.tone)}">
              <span></span>${escapeHtml(point.statusText)}
            </span>
            <span class="trend-tooltip-line">${t('latency')}: <strong>${escapeHtml(String(point.latency))}ms</strong></span>
          </span>
        </span>
      `).join('');
    }

    function providerLink(row, className) {
      const url = configuredProviderUrl();
      return `
        <a class="${className}" href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer" title="${escapeHtml(row.provider)}">
          ${escapeHtml(row.provider)}
        </a>
      `;
    }

    function providerAvatar(row) {
      const text = `${row.provider} ${row.service} ${row.model}`.toLowerCase();
      if (text.includes('codex') || text.includes('openai') || text.includes('gpt')) {
        return '<div class="provider-avatar openai">◎</div>';
      }
      return '<div class="provider-avatar">✹</div>';
    }

    function renderStatusMessage(message, tone = 'muted') {
      const color = tone === 'error' ? '#ee8b91' : '#7f8da6';
      els.tableBody.innerHTML = `
        <tr><td colspan="8" style="padding:30px 12px;color:${color};text-align:center;">${escapeHtml(message)}</td></tr>
      `;
      els.cardGrid.innerHTML = `<div class="empty-card" style="color:${color};">${escapeHtml(message)}</div>`;
    }

    function renderCards(filtered) {
      els.cardGrid.innerHTML = filtered.map((row, index) => `
        <article class="monitor-card ${row.availability >= 99 ? '' : 'unstable'}">
          <div class="card-top">
            <div class="card-marks" aria-hidden="true">${renderAnnotations(row)}</div>
            <div class="card-latency">
              ${row.latency}ms
              <span>${row.time}</span>
            </div>
          </div>
          <div class="card-main">
            ${providerAvatar(row)}
            <div class="provider-cell">
              <div class="card-title-row">
                <div class="card-title">${providerLink(row, 'card-title-link')}</div>
                <span class="card-icons" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M14 3h7v7" />
                    <path d="M10 14 21 3" />
                    <path d="M21 14v7h-7" />
                    <path d="M21 3 3 21" />
                  </svg>
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m12 17.3-5.8 3.1 1.1-6.5-4.7-4.6 6.5-1 2.9-5.8 2.9 5.8 6.5 1-4.7 4.6 1.1 6.5Z" />
                  </svg>
                </span>
              </div>
              <div class="card-meta">
                ${serviceBadge(row.service, 'card-service')}
                <span>${t('multiplier')}<span class="card-rate">${escapeHtml(formatRate(row.rateMultiplier))}</span></span>
                <span>⌁ ${t('cardAvailability')}<span class="card-availability">${row.availability.toFixed(row.availability % 1 ? 2 : 0)}%</span></span>
              </div>
            </div>
            <span class="card-status-dot" aria-hidden="true"></span>
          </div>
          <div class="card-trend-head">
            <span>◷ ${escapeHtml(windowLabel(state.window))}</span>
            <span>${t('now')}</span>
          </div>
          <div class="card-trend" aria-label="${t('availabilityTrend')}">${renderTrendBars(row, index)}</div>
        </article>
      `).join('') || `<div class="empty-card">${t('noMatchingData')}</div>`;
    }

    function renderTable() {
      if (state.loading) {
        els.windowLabel.textContent = windowLabel(state.window);
        els.filterSummary.textContent = t('loading');
        els.lastRefresh.textContent = '--:--:--';
        renderStatusMessage(t('loadingData'));
        updateSortIndicators();
        return;
      }

      if (state.error) {
        els.windowLabel.textContent = windowLabel(state.window);
        els.filterSummary.textContent = t('apiError');
        els.lastRefresh.textContent = '--:--:--';
        renderStatusMessage(state.error, 'error');
        updateSortIndicators();
        return;
      }

      const filtered = sortRows(applyFilters(rows));
      els.windowLabel.textContent = windowLabel(state.window);
      els.filterSummary.textContent = filterSummaryText();
      document.getElementById('windowLabel').textContent = windowLabel(state.window);
      document.getElementById('filterSummary').textContent = filterSummaryText();
      els.lastRefresh.textContent = new Date().toLocaleTimeString(locale === 'zh' ? 'zh-CN' : 'en-US', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });

      els.tableBody.innerHTML = filtered.map((row, index) => {
        return `
          <tr>
            <td class="col-mark">
              <div class="marks" aria-hidden="true">
                ${renderAnnotations(row)}
              </div>
            </td>
            <td class="col-provider">
              <div class="provider-cell">
                <div class="provider-name">
                  ${providerLink(row, 'provider-link')}
                  <svg class="ext" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M14 3h7v7" />
                    <path d="M10 14 21 3" />
                    <path d="M21 14v7h-7" />
                    <path d="M21 3 3 21" />
                  </svg>
                  <svg class="fav" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="m12 17.3-5.8 3.1 1.1-6.5-4.7-4.6 6.5-1 2.9-5.8 2.9 5.8 6.5 1-4.7 4.6 1.1 6.5Z" />
                  </svg>
                </div>
                <div class="provider-meta">${escapeHtml(row.note)}</div>
              </div>
            </td>
            <td class="col-service">
              ${serviceBadge(row.service)}
            </td>
            <td class="col-model model">${escapeHtml(row.model)}</td>
            <td class="col-rate rate">${escapeHtml(formatRate(row.rateMultiplier))}</td>
            <td class="col-availability availability ${availabilityClass(row.availability)}">${row.availability.toFixed(row.availability % 1 ? 2 : 0)}%</td>
            <td class="col-latency">
              <div class="latency-cell">
                <span class="latency-dot ${latencyClass(row.latency)}"></span>
                <div class="latency-text">
                  <span class="latency-ms">${row.latency}ms</span>
                  <span class="latency-time">${row.time}</span>
                </div>
              </div>
            </td>
            <td class="col-trend">
              <div class="trend-row" aria-label="${t('availabilityTrend')}">
                ${renderTrendBars(row, index)}
              </div>
            </td>
          </tr>
        `;
      }).join('') || `
        <tr><td colspan="8" style="padding:30px 12px;color:#7f8da6;text-align:center;">${t('noMatchingData')}</td></tr>
      `;
      renderCards(filtered);

      updateSortIndicators();
    }

    function closeAllSelects(except) {
      document.querySelectorAll('.custom-select.open').forEach((node) => {
        if (node !== except) {
          node.classList.remove('open');
          node.querySelector('.select-trigger')?.setAttribute('aria-expanded', 'false');
        }
      });
    }

    function syncSelect(select, value) {
      const triggerLabel = select.querySelector('.select-label');
      const options = Array.from(select.querySelectorAll('.select-option'));
      const chosen = options.find((option) => option.dataset.value === value) || options[0];
      select.dataset.value = value;
      select.classList.toggle('active', value !== 'all');
      triggerLabel.textContent = chosen ? chosen.textContent.trim() : '';
      options.forEach((option) => option.classList.toggle('selected', option.dataset.value === value));
    }

    function uniqueValues(values) {
      return [...new Set(values.filter((value) => value !== undefined && value !== null && String(value).trim() !== '').map(String))];
    }

    function optionButton(value, label, selectedValue) {
      const selected = value === selectedValue ? ' selected' : '';
      return `<button class="select-option${selected}" type="button" role="option" data-value="${escapeHtml(value)}">${escapeHtml(label)}</button>`;
    }

    function replaceOptions(filter, allLabel, options, selectedValue, labelForValue = (value) => value) {
      const select = document.querySelector(`.custom-select[data-filter="${filter}"]`);
      const container = select?.querySelector('.select-options');
      if (!container) return;
      container.innerHTML = [
        optionButton('all', allLabel, selectedValue),
        ...options.map((value) => optionButton(value, labelForValue(value), selectedValue))
      ].join('');
    }

    function populateFilterOptions() {
      replaceOptions('category', t('allCategories'), uniqueValues(rows.map((row) => row.category)), state.category, (value) => value === 'commercial' ? t('commercial') : value);
      replaceOptions('provider', t('allProviders'), uniqueValues(rows.map((row) => row.provider)), state.provider);
      replaceOptions('service', t('allServices'), uniqueValues(rows.map((row) => row.service)), state.service, formatServiceOption);
      replaceOptions('channel', t('allChannels'), uniqueValues(rows.map((row) => row.channel || row.note)), state.channel);
    }

    function syncAllSelects() {
      syncSelect(document.querySelector('.custom-select[data-filter="category"]'), state.category);
      syncSelect(document.querySelector('.custom-select[data-filter="provider"]'), state.provider);
      syncSelect(document.querySelector('.custom-select[data-filter="service"]'), state.service);
      syncSelect(document.querySelector('.custom-select[data-filter="channel"]'), state.channel);
    }

    function bindCustomSelects() {
      document.querySelectorAll('.custom-select').forEach((select) => {
        const trigger = select.querySelector('.select-trigger');
        const menu = select.querySelector('.select-menu');
        const searchInput = select.querySelector('.select-search');
        trigger.addEventListener('click', (event) => {
          event.stopPropagation();
          const willOpen = !select.classList.contains('open');
          closeAllSelects(select);
          select.classList.toggle('open', willOpen);
          trigger.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
          if (willOpen && searchInput) {
            searchInput.value = '';
            filterSelectOptions(select, '');
            setTimeout(() => searchInput.focus(), 0);
          }
          if (willOpen) requestAnimationFrame(() => keepSelectMenuInViewport(select));
        });
        menu.addEventListener('click', (event) => {
          const option = event.target.closest('.select-option');
          if (!option || !menu.contains(option)) return;
          event.stopPropagation();
          const value = option.dataset.value || 'all';
          syncSelect(select, value);
          select.classList.remove('open');
          trigger.setAttribute('aria-expanded', 'false');

          switch (select.dataset.filter) {
            case 'category': state.category = value; break;
            case 'provider': state.provider = value; break;
            case 'service': state.service = value; break;
            case 'channel': state.channel = value; break;
          }
          renderTable();
        });
        if (searchInput) {
          searchInput.addEventListener('click', (event) => event.stopPropagation());
          searchInput.addEventListener('input', () => filterSelectOptions(select, searchInput.value));
        }
      });
    }

    function keepSelectMenuInViewport(select) {
      const menu = select.querySelector('.select-menu');
      if (!menu) return;
      menu.style.left = '0px';
      const rect = menu.getBoundingClientRect();
      const padding = 12;
      if (rect.right > window.innerWidth - padding) {
        menu.style.left = `${window.innerWidth - padding - rect.right}px`;
      }
      if (rect.left < padding) {
        menu.style.left = `${padding - rect.left}px`;
      }
    }

    function filterSelectOptions(select, query) {
      const normalized = query.trim().toLowerCase();
      select.querySelectorAll('.select-option').forEach((option) => {
        const text = option.textContent.trim().toLowerCase();
        option.style.display = text.includes(normalized) ? '' : 'none';
      });
    }

    function bindEvents() {
      document.querySelectorAll('th.sortable').forEach((th) => {
        th.addEventListener('click', () => {
          const key = th.dataset.sort;
          if (!key) return;
          if (state.sortKey === key) {
            state.sortDir *= -1;
          } else {
            state.sortKey = key;
            state.sortDir = key === 'availability' ? -1 : 1;
          }
          renderTable();
        });
      });

      document.querySelectorAll('.window-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.window-btn').forEach((el) => el.classList.remove('active'));
          btn.classList.add('active');
          state.window = btn.dataset.window || '90m';
          loadStatusData();
        });
      });

      document.querySelectorAll('.view-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          state.view = btn.dataset.view || 'list';
          syncViewMode();
          renderTable();
        });
      });

      els.search.addEventListener('input', () => {
        state.query = els.search.value;
        renderTable();
      });

      els.refreshBtn.addEventListener('click', () => {
        loadStatusData();
      });

      els.refreshSeconds.addEventListener('change', () => {
        state.autoRefresh = true;
        updateAutoRefresh();
      });
      els.refreshSeconds.addEventListener('blur', updateAutoRefresh);

      document.addEventListener('click', () => closeAllSelects());
      window.addEventListener('blur', () => closeAllSelects());
      if (typeof mobileCardsMediaQuery.addEventListener === 'function') {
        mobileCardsMediaQuery.addEventListener('change', syncViewMode);
      } else if (typeof mobileCardsMediaQuery.addListener === 'function') {
        mobileCardsMediaQuery.addListener(syncViewMode);
      }
    }

    function updateAutoRefresh() {
      if (state.refreshHandle) {
        clearInterval(state.refreshHandle);
        state.refreshHandle = null;
      }
      if (!state.autoRefresh) return;

      const seconds = Math.max(5, Number(els.refreshSeconds.value) || 30);
      els.refreshSeconds.value = String(seconds);
      state.refreshHandle = setInterval(loadStatusData, seconds * 1000);
    }

    function init() {
      applyStaticText();
      bindCustomSelects();
      bindEvents();
      syncAllSelects();
      syncViewMode();
      loadStatusData();
      updateAutoRefresh();
    }

    init();
  </script>
</body>
</html>
